<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Todolist</title>
</head>
<body id="body">
    <div class="container">
        <div class="todolist">
            <h1>To do list</h1>
            <button id="btn-color" onclick="changeColor('black')">เปลี่ยนสี</button>
            <div class="row">
                <input id="task" type="text" placeholder="Enter your task">
                <button onclick="addtask()" class="button-add">ADD</button>
            </div>
            <ul id="result">
                
            </ul>
        </div>
    </div>


    <script src="main.js"></script>
</body>
</html>
